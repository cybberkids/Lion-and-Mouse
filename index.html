<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Revista Digital</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/3/turn.min.js"></script>
    
    <style>
        #conteudo-protegido {
            display: none;
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        body {
            background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
            box-sizing: border-box;
            width: 100vw;
            height: 100vh;
        }
        
        .conteudo-principal {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100%;
        }

        /* --- CONFIGURAÇÕES DO LIVRO --- */
        #revista {
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
        }
        
        .pagina {
            background-size: contain; 
            background-repeat: no-repeat;
            background-position: center;
            background-color: #fff;
        }
        
        .painel-lateral-direito {
            position: absolute;
            right: 25px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            z-index: 20;
        }

        .container-video {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(255, 255, 255, 0.15);
            padding: 10px;
            border-radius: 15px;
            backdrop-filter: blur(5px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }

        .container-video video {
            width: 130px;   
            height: 195px;  
            object-fit: cover; 
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .legenda-video {
            color: white;
            font-weight: bold;
            font-size: 12px;
            margin-top: 8px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.3);
        }

        .player-narracao {
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 100%;
        }

        .btn-navegacao {
            position: absolute;
            bottom: 30px;
            z-index: 30;
        }

        .btn-left { left: 30px; }
        .btn-right { right: 30px; }
        
        .btn {
            background-color: #fff;
            color: #333;
            border: none;
            padding: 14px 30px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }
        .btn:hover {
            background-color: #eee;
            transform: scale(1.05);
        }
        .btn-audio {
            font-size: 12px;
            padding: 10px;
            background-color: #4a5568;
            color: #fff;
            text-align: center;
            width: 100%;
            box-sizing: border-box;
        }

        /* --- REGRAS RESPONSIVAS PARA TABLETS E CELULARES --- */
        @media (max-width: 1100px) {
            body, #conteudo-protegido {
                overflow-y: auto;
                height: auto;
                min-height: 100vh;
                flex-direction: column;
                justify-content: flex-start;
                padding-top: 15px;
            }

            .conteudo-principal {
                height: auto;
                margin-top: 10px;
            }

            .painel-lateral-direito {
                position: static;
                transform: none;
                margin: 20px 0 90px 0;
                width: auto;
            }

            .player-narracao {
                flex-direction: row;
                gap: 10px;
            }

            .btn-navegacao {
                position: fixed;
                bottom: 15px;
                padding: 12px 22px;
                font-size: 15px;
            }
            .btn-left { left: 15px; }
            .btn-right { right: 15px; }
        }
    </style>
</head>
<body>

    <div id="conteudo-protegido">
        <audio id="audioVirada" src="som.mp3"></audio>
        <audio id="narracaoMasc" src="narracao_masc.mp3"></audio>
        <audio id="narracaoFem" src="narracao_fem.mp3"></audio>

        <div class="conteudo-principal">
            <div id="revista">
                <div class="pagina" style="background-image: url('pag1.png');"></div>
                <div class="pagina" style="background-image: url('pag2.png');"></div>
                <div class="pagina" style="background-image: url('pag3.png');"></div>
                <div class="pagina" style="background-image: url('pag4.png');"></div>
                <div class="pagina" style="background-image: url('pag5.png');"></div>
                <div class="pagina" style="background-image: url('pag6.png');"></div>
                <div class="pagina" style="background-image: url('pag7.png');"></div>
                <div class="pagina" style="background-image: url('pag8.png');"></div>
                <div class="pagina" style="background-image: url('pag9.png');"></div>
                <div class="pagina" style="background-image: url('pag10.png');"></div>
                <div class="pagina" style="background-image: url('pag11.png');"></div>
                <div class="pagina" style="background-image: url('pag12.png');"></div>
                <div class="pagina" style="background-image: url('pag13.png');"></div>
                <div class="pagina" style="background-image: url('pag14.png');"></div>
                <div class="pagina" style="background-image: url('pag15.png');"></div>
                <div class="pagina" style="background-image: url('pag16.png');"></div>
                <div class="pagina" style="background-image: url('pag17.png');"></div>
                <div class="pagina" style="background-image: url('pag18.png');"></div>
                <div class="pagina" style="background-image: url('pag19.png');"></div>
                <div class="pagina" style="background-image: url('pag20.png');"></div>
                <div class="pagina" style="background-image: url('pag21.png');"></div>
                <div class="pagina" style="background-image: url('pag22.png');"></div>
                <div class="pagina" style="background-image: url('pag23.png');"></div>
                <div class="pagina" style="background-image: url('pag24.png');"></div>
                <div class="pagina" style="background-image: url('pag25.png');"></div>
                <div class="pagina" style="background-image: url('pag26.png');"></div>
                <div class="pagina" style="background-image: url('pag27.png');"></div>
                <div class="pagina" style="background-image: url('pag28.png');"></div>
                <div class="pagina" style="background-image: url('pag29.png');"></div>
                <div class="pagina" style="background-image: url('pag30.png');"></div>
            </div>
        </div>

        <div class="painel-lateral-direito">
            <div class="container-video">
                <video src="minicyber.mp4" controls></video>
                <div class="legenda-video">Narration by Mini Cyber</div>
            </div>
            
            <div class="player-narracao">
                <button class="btn btn-audio" onclick="controlarNarracao('fem')">Grandmother Cyber</button>
                <button class="btn btn-audio" onclick="controlarNarracao('masc')">Uncle Cyber</button>
            </div>
        </div>

        <button class="btn btn-navegacao btn-left" onclick="$('#revista').turn('previous');">◀ Go back</button>
        <button class="btn btn-navegacao btn-right" onclick="$('#revista').turn('next');">Go ▶</button>
    </div>

    <script>
        var senhaCorreta = "cyberlion";
        
        var acessoLiberado = localStorage.getItem("acesso_liberado") === "true";

        if (!acessoLiberado) {
            var senhaDigitada = prompt("Please enter the password to access the children's book:");
            if (senhaDigitada === senhaCorreta) {
                localStorage.setItem("acesso_liberado", "true");
                acessoLiberado = true;
            } else {
                alert("Incorrect password! Access denied.");
                document.body.innerHTML = "<h1 style='color:white; text-align:center; margin-top:20vh;'>Access denied. Please reload the page to try again.</h1>";
            }
        }

        if (acessoLiberado) {
            document.getElementById('conteudo-protegido').style.display = 'flex';
            
            var larguraTela = window.innerWidth;

            // Apenas telas pequenas (celulares com até 600px) usam modo único
            var esCelular = larguraTela <= 600;

            var larguraLivro = (larguraTela <= 1100) ? Math.min(larguraTela - 40, 960) : 960;
            var alturaLivro = (larguraTela <= 1100 && esCelular) ? (larguraLivro * 1.4) : 640;

            // Ajusta o CSS do container e das páginas
            $('#revista').css({ width: larguraLivro + 'px', height: alturaLivro + 'px' });
            $('.pagina').css({ width: (esCelular ? larguraLivro : larguraLivro / 2) + 'px', height: alturaLivro + 'px' });

            $('#revista').turn({
                width: larguraLivro,
                height: alturaLivro,
                display: esCelular ? 'single' : 'double', // Celular = 1 página | Tablet e PC = 2 páginas
                autoCenter: true,
                when: {
                    turning: function(event, page, view) {
                        var som = document.getElementById('audioVirada');
                        som.currentTime = 0;
                        som.play().catch(function(e){ console.log("Som aguardando clique inicial."); });
                    }
                }
            });
        }

        function controlarNarracao(tipo) {
            var masc = document.getElementById('narracaoMasc');
            var fem = document.getElementById('narracaoFem');

            if (tipo === 'masc') {
                fem.pause();
                if (masc.paused) { masc.play(); } else { masc.pause(); }
            } else {
                masc.pause();
                if (fem.paused) { fem.play(); } else { fem.pause(); }
            }
        }
    </script>

</body>
</html>
