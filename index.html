<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Revista Digital</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/3/turn.min.js"></script>
    
    <style>
        body {
            /* Alteração 1: Fundo com degradê colorido e vibrante */
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: auto; /* Permite rolagem caso a tela do monitor seja menor que o livro */
            font-family: Arial, sans-serif;
            padding: 20px;
            box-sizing: border-box;
        }
        
        /* Alteração 2: Tamanho ajustado para páginas de 1200x1800px (Largura total = 2 páginas = 2400px) */
        #revista {
            width: 2400px;
            height: 1800px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5); /* Sombra para dar efeito de profundidade */
        }
        
        .pagina {
            width: 1200px;
            height: 1800px;
            background-size: contain; 
            background-repeat: no-repeat;
            background-position: center;
            background-color: #fff;
        }
        
        /* Botões de navegação */
        .controles {
            margin-top: 30px;
            z-index: 10;
        }
        .btn {
            background-color: #fff;
            color: #333;
            border: none;
            padding: 15px 30px;
            margin: 0 15px;
            cursor: pointer;
            font-weight: bold;
            font-size: 18px;
            border-radius: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }
        .btn:hover {
            background-color: #eee;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div id="revista">
        <div class="pagina" style="background-image: url('pag1.png');"></div>
        <div class="pagina" style="background-image: url('pag2.png');"></div>
        <div class="pagina" style="background-image: url('pag3.png');"></div>
        <div class="pagina" style="background-image: url('pag4.png');"></div>
        <div class="pagina" style="background-image: url('pag5.png');"></div>
        <div class="pagina" style="background-image: url('pag6.png');"></div>
        <div class="pagina" style="background-image: url('pag7.png');"></div>
        <div class="pagina" style="background-image: url('pag8.png');"></div>
        <div class="pagina" style="background-image: url('pag9.png');"></div>
        <div class="pagina" style="background-image: url('pag10.png');"></div>
        <div class="pagina" style="background-image: url('pag11.png');"></div>
        <div class="pagina" style="background-image: url('pag12.png');"></div>
        <div class="pagina" style="background-image: url('pag13.png');"></div>
        <div class="pagina" style="background-image: url('pag14.png');"></div>
        <div class="pagina" style="background-image: url('pag15.png');"></div>
        <div class="pagina" style="background-image: url('pag16.png');"></div>
        <div class="pagina" style="background-image: url('pag17.png');"></div>
        <div class="pagina" style="background-image: url('pag18.png');"></div>
        <div class="pagina" style="background-image: url('pag19.png');"></div>
        <div class="pagina" style="background-image: url('pag20.png');"></div>
        <div class="pagina" style="background-image: url('pag21.png');"></div>
        <div class="pagina" style="background-image: url('pag22.png');"></div>
        <div class="pagina" style="background-image: url('pag23.png');"></div>
        <div class="pagina" style="background-image: url('pag24.png');"></div>
        <div class="pagina" style="background-image: url('pag25.png');"></div>
        <div class="pagina" style="background-image: url('pag26.png');"></div>
        <div class="pagina" style="background-image: url('pag27.png');"></div>
        <div class="pagina" style="background-image: url('pag28.png');"></div>
        <div class="pagina" style="background-image: url('pag29.png');"></div>
        <div class="pagina" style="background-image: url('pag30.png');"></div>
    </div>

    <div class="controles">
        <button class="btn" onclick="$('#revista').turn('previous');">◀ Voltar</button>
        <button class="btn" onclick="$('#revista').turn('next');">Avançar ▶</button>
    </div>

    <script>
        /* Configuração do script com as novas proporções */
        $('#revista').turn({
            width: 2400,
            height: 1800,
            autoCenter: true
        });
    </script>

</body>
</html>
